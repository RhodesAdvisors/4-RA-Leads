<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhodes Advisors — Lead Accountability Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:   #03511f;
    --cream:   #F1EAE1;
    --lgray:   #efefef;
    --lgreen:  #A9E67D;
    --teal50:  #E1F5EE;
    --teal400: #1D9E75;
    --teal800: #085041;
    --purple50:#EEEDFE;
    --purple400:#534AB7;
    --purple800:#3C3489;
    --coral50: #FAECE7;
    --coral400:#D85A30;
    --coral800:#712B13;
    --amber50: #FAEEDA;
    --amber400:#BA7517;
    --amber800:#633806;
    --gray50:  #F1EFE8;
    --gray400: #888780;
    --gray800: #444441;
    --panel-w: 420px;
    --ease: cubic-bezier(.4,0,.2,1);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: #1a1a18;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--green);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo-mark {
    width: 36px;
    height: 36px;
    background: var(--lgreen);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--green);
    font-weight: 400;
    flex-shrink: 0;
  }

  .header-text h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    font-weight: 400;
    color: #fff;
    letter-spacing: 0.01em;
  }

  .header-text p {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    font-weight: 300;
    margin-top: 2px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  .diagram-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 32px 40px;
    transition: margin-right 0.35s var(--ease);
  }

  .diagram-area.shifted {
    margin-right: var(--panel-w);
  }

  .diagram-hint {
    font-size: 12px;
    color: var(--gray400);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 24px;
    font-weight: 400;
  }

  svg.diagram {
    width: 100%;
    max-width: 680px;
  }

  .node {
    cursor: pointer;
  }

  .node rect, .node .bg {
    transition: filter 0.15s;
  }

  .node:hover rect, .node:hover .bg {
    filter: brightness(0.93);
  }

  .node:hover .overlap-bg {
    filter: brightness(0.93);
  }

  /* Legend */
  .legend {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-top: 28px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--gray800);
  }

  .legend-swatch {
    width: 12px;
    height: 12px;
    border-radius: 3px;
  }

  .legend-swatch.dashed {
    border: 1.5px dashed var(--gray400);
    background: var(--gray50);
  }

  /* Side panel */
  .panel {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: var(--panel-w);
    background: #fff;
    border-left: 1px solid #e0dcd5;
    transform: translateX(100%);
    transition: transform 0.35s var(--ease);
    display: flex;
    flex-direction: column;
    z-index: 100;
    overflow: hidden;
  }

  .panel.open {
    transform: translateX(0);
  }

  .panel-header {
    padding: 28px 28px 20px;
    border-bottom: 1px solid #ece8e0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    flex-shrink: 0;
  }

  .panel-lead-label {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .panel-tag {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 20px;
    display: inline-block;
    width: fit-content;
  }

  .panel-title {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    font-weight: 400;
    line-height: 1.15;
    color: #1a1a18;
  }

  .panel-subtitle {
    font-size: 13px;
    color: var(--gray400);
    margin-top: 4px;
    font-weight: 300;
  }

  .close-btn {
    background: var(--lgray);
    border: none;
    cursor: pointer;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
    font-size: 16px;
    color: var(--gray800);
    line-height: 1;
    margin-top: 4px;
  }

  .close-btn:hover { background: #ddd; }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px 36px;
    -webkit-overflow-scrolling: touch;
  }

  .responsibility-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .responsibility-item {
    padding: 18px 0;
    border-bottom: 1px solid #f0ece6;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }

  .responsibility-item:last-child {
    border-bottom: none;
  }

  .item-accent {
    width: 4px;
    min-width: 4px;
    height: 4px;
    border-radius: 50%;
    margin-top: 8px;
    flex-shrink: 0;
  }

  .item-content {}

  .item-title {
    font-size: 14px;
    font-weight: 500;
    color: #1a1a18;
    margin-bottom: 5px;
    line-height: 1.35;
  }

  .item-body {
    font-size: 13px;
    color: #5a5752;
    line-height: 1.65;
    font-weight: 300;
  }

  .panel-overlap-note {
    background: var(--gray50);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 20px;
    font-size: 12.5px;
    color: var(--gray800);
    line-height: 1.6;
    border-left: 3px solid var(--gray400);
  }

  .panel-overlap-note strong {
    font-weight: 500;
    color: #1a1a18;
  }

  .decision-rule {
    background: #f7f4ef;
    border-radius: 8px;
    padding: 14px 16px;
    margin-top: 20px;
    font-size: 12.5px;
    color: #1a1a18;
    line-height: 1.6;
  }

  .decision-rule .dr-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gray400);
    font-weight: 500;
    margin-bottom: 6px;
  }

  /* Overlay for mobile */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.25);
    z-index: 99;
    opacity: 0;
    transition: opacity 0.35s var(--ease);
  }

  .overlay.visible {
    display: block;
    opacity: 1;
  }

  @media (max-width: 700px) {
    :root { --panel-w: 100vw; }
    .diagram-area.shifted { margin-right: 0; }
    .overlay { display: block; }
  }
</style>
</head>

const panel = document.getElementById('panel');
const panelTitle = document.getElementById('panelTitle');
const panelSubtitle = document.getElementById('panelSubtitle');
const panelTag = document.getElementById('panelTag');
const panelBody = document.getElementById('panelBody');
const closeBtn = document.getElementById('closeBtn');
const overlay = document.getElementById('overlay');
const diagramArea = document.getElementById('diagramArea');

function openPanel(id) {
  const d = data[id];
  if (!d) return;

  panelTag.textContent = d.tag;
  panelTag.style.background = d.tagBg;
  panelTag.style.color = d.tagColor;
  panelTitle.textContent = d.title;
  panelSubtitle.textContent = d.subtitle;

  let html = '';

  if (d.overlapNote) {
    html += `<div class="panel-overlap-note">${d.overlapNote}</div>`;
  }

  html += '<ul class="responsibility-list">';
  d.items.forEach(item => {
    const accentColor = d.tagColor;
    html += `<li class="responsibility-item">
      <div class="item-accent" style="background:${accentColor};"></div>
      <div class="item-content">
        <div class="item-title">${item.title}</div>
        <div class="item-body">${item.body}</div>
      </div>
    </li>`;
  });
  html += '</ul>';

  if (d.rule) {
    html += `<div class="decision-rule">
      <div class="dr-label">Decision rule</div>
      <div>${d.rule}</div>
    </div>`;
  }

  panelBody.innerHTML = html;
  panelBody.scrollTop = 0;

  panel.classList.add('open');
  diagramArea.classList.add('shifted');
  overlay.classList.add('visible');
}

function closePanel() {
  panel.classList.remove('open');
  diagramArea.classList.remove('shifted');
  overlay.classList.remove('visible');
}

document.querySelectorAll('.node[data-id]').forEach(node => {
  node.addEventListener('click', () => openPanel(node.dataset.id));
  node.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      openPanel(node.dataset.id);
    }
  });
});

closeBtn.addEventListener('click', closePanel);
overlay.addEventListener('click', closePanel);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePanel();
});
</script>
