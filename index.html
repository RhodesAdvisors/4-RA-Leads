<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhodes Advisors — Lead Accountability Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:#03511f; --cream:#F1EAE1; --lgray:#efefef; --lgreen:#A9E67D;
    --panel-w:430px; --ease:cubic-bezier(.4,0,.2,1);
  }

  body { font-family:'DM Sans',sans-serif; background:var(--cream); color:#1a1a18; min-height:100vh; display:flex; flex-direction:column; }

  header { background:var(--green); padding:20px 40px; display:flex; align-items:center; gap:16px; }
  .logo-mark { width:44px; height:44px; border-radius:4px; overflow:hidden; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .header-text h1 { font-family:'DM Serif Display',serif; font-size:17px; font-weight:400; color:#fff; }
  .header-text p { font-size:12px; color:rgba(255,255,255,.5); font-weight:300; margin-top:2px; letter-spacing:.05em; text-transform:uppercase; }

  .main { flex:1; display:flex; overflow:hidden; }

  .diagram-area { flex:1; display:flex; flex-direction:column; align-items:center; padding:32px 24px 40px; transition:margin-right .35s var(--ease); }
  .diagram-area.shifted { margin-right:var(--panel-w); }

  .diagram-hint { font-size:11.5px; color:#888780; letter-spacing:.05em; text-transform:uppercase; margin-bottom:18px; }

  svg.diagram { width:100%; max-width:700px; }

  .node { cursor:pointer; }
  .node:hover .node-bg { filter:brightness(.91); }

  .legend { display:flex; align-items:center; gap:20px; margin-top:20px; flex-wrap:wrap; justify-content:center; }
  .legend-item { display:flex; align-items:center; gap:8px; font-size:12px; color:#444441; }
  .legend-swatch { width:12px; height:12px; border-radius:3px; flex-shrink:0; }

  /* Panel */
  .panel { position:fixed; top:0; right:0; bottom:0; width:var(--panel-w); background:#fff; border-left:1px solid #e0dcd5; transform:translateX(100%); transition:transform .35s var(--ease); display:flex; flex-direction:column; z-index:100; }
  .panel.open { transform:translateX(0); }

  .panel-header { padding:26px 28px 18px; border-bottom:1px solid #ece8e0; display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-shrink:0; }
  .panel-meta { display:flex; flex-direction:column; gap:8px; }
  .panel-tag { font-size:11px; letter-spacing:.08em; text-transform:uppercase; font-weight:500; padding:3px 9px; border-radius:20px; display:inline-block; width:fit-content; }
  .panel-title { font-family:'DM Serif Display',serif; font-size:26px; font-weight:400; line-height:1.15; color:#1a1a18; }
  .panel-subtitle { font-size:13px; color:#888780; font-weight:300; }
  .one-thing-box { padding:10px 14px; border-radius:8px; display:flex; flex-direction:column; gap:3px; }
  .one-thing-lbl { font-size:10px; letter-spacing:.1em; text-transform:uppercase; font-weight:500; opacity:.65; }
  .one-thing-val { font-size:15px; font-weight:500; line-height:1.3; }
  .close-btn { background:var(--lgray); border:none; cursor:pointer; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:16px; color:#444441; margin-top:4px; transition:background .15s; }
  .close-btn:hover { background:#ddd; }

  .panel-body { flex:1; overflow-y:auto; padding:22px 28px 36px; }

  .resp-list { list-style:none; display:flex; flex-direction:column; }
  .resp-item { padding:17px 0; border-bottom:1px solid #f0ece6; display:flex; gap:14px; }
  .resp-item:last-child { border-bottom:none; }
  .item-dot { width:4px; min-width:4px; height:4px; border-radius:50%; margin-top:8px; flex-shrink:0; }
  .item-title { font-size:14px; font-weight:500; color:#1a1a18; margin-bottom:5px; line-height:1.35; }
  .item-body { font-size:13px; color:#5a5752; line-height:1.65; font-weight:300; }

  .overlap-note { background:#F1EFE8; border-radius:8px; padding:14px 16px; margin-bottom:20px; font-size:12.5px; color:#444441; line-height:1.6; border-left:3px solid #888780; }
  .rule-box { background:#f7f4ef; border-radius:8px; padding:14px 16px; margin-top:20px; font-size:12.5px; color:#1a1a18; line-height:1.6; }
  .rule-label { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:#888780; font-weight:500; margin-bottom:6px; }

  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.25); z-index:99; opacity:0; transition:opacity .35s var(--ease); }
  .overlay.visible { display:block; opacity:1; }

  @media (max-width:700px) { :root { --panel-w:100vw; } .diagram-area.shifted { margin-right:0; } .overlay { display:block !important; } }
</style>
</head>

        <text font-family="'DM Sans',sans-serif" font-size="12" font-weight="500" fill="#444441" x="220" y="314" text-anchor="middle" dominant-baseline="central">Mkt + Finance</text>

        <text font-family="'DM Sans',sans-serif" font-size="12" font-weight="500" fill="#444441" x="480" y="314" text-anchor="middle" dominant-baseline="central">Tech + Enroll</text>
      </g>


      <!-- ══ ANALYTICS (grey area, heavy dashed, center) ══ -->
      <g class="node" data-id="analytics" tabindex="0" role="button" aria-label="Analytics grey area">

        <text font-family="'DM Sans',sans-serif" font-size="13" font-weight="500" fill="#444441" x="350" y="298" text-anchor="middle" dominant-baseline="central">Analytics</text>
        <text font-family="'DM Sans',sans-serif" font-size="10.5" fill="#5F5E5A" x="350" y="318" text-anchor="middle" dominant-baseline="central">All four have accountability,</text>
        <text font-family="'DM Sans',sans-serif" font-size="10.5" fill="#5F5E5A" x="350" y="337" text-anchor="middle" dominant-baseline="central">ad hoc role clarity required</text>
      </g>

    </svg>

    <div class="legend">
      <div class="legend-item">
        <div class="legend-swatch" style="background:#E1F5EE;border:1px solid #1D9E75;"></div>
        <span>Sole owner</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background:#F1EFE8;border:1px solid #888780;"></div>
        <span>Shared overlap</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background:#F1EFE8;border:2px dashed #888780;"></div>
        <span>Grey area, needs owner</span>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay"></div>

  <div class="panel" id="panel" role="dialog" aria-modal="true">
    <div class="panel-header">
      <div class="panel-meta">
        <span class="panel-tag" id="panelTag"></span>
        <div class="panel-title" id="panelTitle"></div>
        <div class="panel-subtitle" id="panelSubtitle"></div>
        <div class="one-thing-box" id="otBox" style="display:none">
          <div class="one-thing-lbl">One thing</div>
          <div class="one-thing-val" id="otVal"></div>
        </div>
      </div>
      <button class="close-btn" id="closeBtn" aria-label="Close">&#x2715;</button>
    </div>
    <div class="panel-body" id="panelBody"></div>
  </div>
</div>

<script>
const D = {
  marketing: {
    title:"Marketing lead", subtitle:"Primary accountability zone",
    tag:"Primary owner", tagBg:"#E1F5EE", tagColor:"#085041",
    oneThing:"Lead volume and quality", otBg:"#d4f0e4", otColor:"#085041",
    items:[
      {t:"Brand and market position",b:"How programs are positioned, named, and messaged in the market. Differentiation from competitors. The Marketing Lead is the primary driver of positioning strategy — depending on the engagement, RA may lead this work directly or advise the university's internal team as they execute it."},
      {t:"Top-of-funnel inquiry volume",b:"When qualified inquiry volume is too low, that is a marketing problem. The Marketing Lead focuses on paid media strategy, channel mix, spend allocation, and vendor oversight. Whether RA manages this directly or the university's team does varies by client — but the Marketing Lead is accountable for diagnosing the gap and recommending the path forward."},
      {t:"Lead quality standards",b:"Not all inquiries are equal. The Marketing Lead is responsible for setting and monitoring lead quality standards — right audience, right program fit, right intent signal. This may mean RA builds the criteria, the university applies them, or both work through it together depending on the client's internal capacity."},
      {t:"Campaign creative and execution",b:"Copy, creative direction, landing pages, email content strategy, and ad creative. The Marketing Lead guides narrative direction and ensures campaign assets reflect the program's value proposition. Execution may sit with RA, the university's in-house team, or a vendor — the lead's role is to ensure alignment regardless."},
      {t:"Vendor and agency oversight",b:"When a paid media agency, SEO partner, or content vendor is underperforming, the Marketing Lead is responsible for surfacing it and recommending action. Whether RA manages vendor relationships directly or advises the university on how to manage them depends on the scope of the engagement."},
      {t:"SEO and organic content strategy",b:"Keyword strategy, content calendar, and inbound architecture are Marketing Lead responsibilities. RA may develop and execute these directly, or advise the university's team — but the Marketing Lead is accountable for ensuring a strategy exists and is being followed."},
      {t:"Program launch readiness (go-to-market)",b:"The Marketing Lead drives GTM strategy for new programs: audience targeting, positioning, channel strategy, and launch sequencing. Depending on the engagement, RA may own execution end-to-end or hand off to the university's team with a clear brief. Either way, the Marketing Lead ensures the strategy is sound before launch."}
    ],
    rule:"If the problem is rooted in how programs are messaged, where spend is allocated, or how leads are generated — the Marketing Lead should be involved, whether that means RA leads the fix or guides the university's team through it."
  },
  tech: {
    title:"Tech lead", subtitle:"Primary accountability zone",
    tag:"Primary owner", tagBg:"#EEEDFE", tagColor:"#3C3489",
    oneThing:"On time and on scope projects", otBg:"#e0deff", otColor:"#3C3489",
    items:[
      {t:"CRM architecture and configuration",b:"Platform decisions, data structure, automation logic, and system performance are Tech Lead territory. RA may configure systems directly or advise the university's internal tech team — depending on the client, one or both parties will have hands on the platform."},
      {t:"Project delivery against scope and timeline",b:"The Tech Lead is accountable for ensuring work gets delivered on time and within scope. Whether RA is the primary delivery vehicle or is managing a university-side project team, the Tech Lead owns the plan and flags when it is at risk."},
      {t:"Martech stack selection and governance",b:"Evaluating, procuring, and deprecating marketing and enrollment technology tools. RA may lead this assessment directly or advise the university's leadership team — the Tech Lead's role is to ensure decisions are grounded in evidence and operational fit, not vendor relationships or inertia."},
      {t:"Data infrastructure and integrations",b:"How systems talk to each other — API connections, data pipelines, and feed reliability. The Tech Lead is accountable for identifying where data flow breaks down and recommending solutions, whether RA's team resolves it or the university's IT function does."},
      {t:"Analytics implementation and instrumentation",b:"GA4, GTM, tracking pixels, and dashboard infrastructure. The Tech Lead is responsible for ensuring data is captured correctly. In some engagements RA implements this directly; in others, RA audits the university's existing implementation and advises on corrections."},
      {t:"Website and digital infrastructure",b:"Uptime, page performance, technical SEO health, and the development roadmap. The Tech Lead surfaces problems and drives resolution — execution may sit with RA, a university web team, or an external vendor depending on the client's setup."},
      {t:"Systems security and data compliance",b:"Data governance, FERPA compliance for technology systems, and access controls. The Tech Lead ensures these considerations are part of every systems decision. RA may advise the university's IT and compliance teams, or take a more direct role depending on the engagement structure."}
    ],
    rule:"If the problem is rooted in a system, a timeline, or a data flow — the Tech Lead should be involved. Whether the fix sits with RA or the university depends on the engagement, but the Tech Lead owns the diagnosis and the recommendation."
  },
  enrollment: {
    title:"Enrollment lead", subtitle:"Primary accountability zone",
    tag:"Primary owner", tagBg:"#FAECE7", tagColor:"#712B13",
    oneThing:"Enrollment forecasting and achievement", otBg:"#fce0d4", otColor:"#712B13",
    items:[
      {t:"Enrollment forecast accuracy",b:"The Enrollment Lead is responsible for the enrollment projection — how many students are expected to enroll, by program, by term. Finance models around that number and Marketing allocates spend against it. Whether RA builds the forecast directly or the university's enrollment team owns it with RA's guidance depends on the engagement."},
      {t:"Enrollment achievement against target",b:"When the term closes, the Enrollment Lead is accountable for understanding the gap or the gain. This may mean RA conducts the post-mortem analysis, the university's leadership team leads it with RA's input, or both work through it together — but the Enrollment Lead ensures the analysis happens and the findings are acted on."},
      {t:"Inquiry response and follow-up cadences",b:"Speed-to-contact, outreach sequences, and communication protocols once a prospect raises their hand. The Enrollment Lead is responsible for ensuring these standards exist and are met. In some engagements RA designs and monitors the cadence; in others, RA advises the university's enrollment team on where their current approach is falling short."},
      {t:"Application pipeline management",b:"Monitoring application volume, completion rates, and decision timelines by program. The Enrollment Lead is accountable for spotting where the pipeline is stalling. Whether RA or the university's team takes corrective action depends on the engagement scope."},
      {t:"Yield strategy and admitted-to-enrolled conversion",b:"Converting admitted students to enrolled students involves aid deployment, event strategy, and personalized outreach. The Enrollment Lead shapes the approach and monitors performance. Execution may sit with the university's enrollment team, RA, or a mix — the Enrollment Lead's role is to ensure the strategy is coherent and the university has what it needs to execute it."},
      {t:"Advisor performance and capacity",b:"Enrollment advisor hiring, training, and performance management are university-side functions in most engagements. The Enrollment Lead's role here is typically advisory — identifying capacity gaps, setting performance benchmarks, and helping the university's leadership team build and manage an effective team."},
      {t:"Enrollment reporting to institutional leadership",b:"Communicating funnel health, projections, and variance to Deans, Provosts, and institutional stakeholders. RA may produce these reports directly, co-develop them with the university's enrollment team, or advise on what the university's leadership should be tracking — depending on the engagement."}
    ],
    rule:"If the problem involves what happens after a prospect raises their hand — the forecast, the conversion process, or the advisor team — the Enrollment Lead should be driving the response, whether that is RA taking direct action or advising the university's team."
  },
  finance: {
    title:"Finance lead", subtitle:"Primary accountability zone",
    tag:"Primary owner", tagBg:"#FAEEDA", tagColor:"#633806",
    oneThing:"Accurate modeling", otBg:"#fde9c0", otColor:"#633806",
    items:[
      {t:"Financial modeling for institutional investment decisions",b:"The Finance Lead is responsible for models that inform CFO and senior leadership decisions — program net revenue, operating margin, and return on investment. RA may build these models directly (as with the seven-year financial model at UVA OEDI across 40+ programs) or work alongside the university's finance team to develop and validate them, depending on the client's internal capacity."},
      {t:"Program growth rate projections",b:"Projecting how fast a program can realistically grow and what that growth costs. The Finance Lead owns the analytical framework and the key assumptions. In some engagements RA produces these projections; in others, RA pressure-tests projections the university's team has built and helps leadership understand what the numbers actually mean."},
      {t:"Staffing models tied to enrollment targets",b:"When enrollment scales, staffing must scale with it. The Finance Lead is responsible for connecting enrollment projections to headcount requirements. RA may build these models from scratch or help the university's finance and HR teams develop a methodology they can sustain independently."},
      {t:"Scenario-based planning and sensitivity analysis",b:"The Finance Lead produces scenario-based projections that let the CFO stress-test assumptions — what happens at 5% growth versus 12%, or if a program launch takes longer than projected. RA typically leads this analytical work, but the university's leadership team must engage with the outputs for them to drive real decisions."},
      {t:"Cost-sharing and funding architecture",b:"How the central online function is funded relative to colleges — through cost recovery, central appropriation, or revenue-share incentives — is one of the highest-leverage advisory questions RA addresses. The Finance Lead develops options and the principles that make them sustainable, but the final structure is always a university decision."},
      {t:"Revenue forecasting and net tuition modeling",b:"Translating enrollment projections into financial outcomes — net tuition revenue after aid, program-level margin, and total contribution to the institution. RA may lead this modeling or support the university's finance team in developing it. Either way, the Finance Lead ensures the assumptions are defensible and the outputs are understood by the people using them."},
      {t:"Setting operating teams up for execution",b:"The Finance Lead's job is to produce models that give Marketing, Enrollment, and Tech the financial clarity they need to operate — target CAC, advisor headcount budgets, break-even enrollment by program. These outputs may come from RA directly or emerge through a structured advisory process with the university's finance function."}
    ],
    rule:"If the problem is rooted in a financial model, a budget assumption, or a lack of clarity on what the numbers mean — the Finance Lead should be involved. RA may build the analysis or guide the university's team through it depending on the engagement."
  },
  "mkt-tech": {
    title:"Marketing + Tech", subtitle:"Marketing drives, Tech builds",
    tag:"Shared zone", tagBg:"#F1EFE8", tagColor:"#444441",
    note:"Both leads have standing here. Marketing defines what needs to happen; Tech determines how it can be built. Depending on the engagement, RA may hold one or both of these roles — or may be advising university-side teams who hold them.",
    items:[
      {t:"Campaign infrastructure and tracking setup",b:"UTM architecture, pixel implementation, and tag management. Marketing defines what needs to be measured; Tech builds the infrastructure that captures it. This work may be executed by RA, by the university's internal teams, or by a combination — but both leads need to be aligned on requirements before either side builds anything."},
      {t:"Martech tool selection when Marketing is the primary user",b:"Marketing leads requirements definition; Tech leads evaluation, procurement, and integration. Whether RA is managing this process directly or advising the university's marketing and IT teams, the division of responsibility between these two leads should be explicit before decisions are made."},
      {t:"Website performance as it affects campaign conversion",b:"Slow load times, broken forms, and poor mobile experiences affect conversion rates. Marketing surfaces the impact; Tech resolves the underlying cause. In many university environments, the website is managed by a central communications team — the Marketing and Tech Leads need to know who that is and how to work with them."},
      {t:"Digital execution where strategy and systems intersect",b:"Landing page builds, A/B testing infrastructure, and personalization require both leads. Marketing owns the hypothesis and the creative direction. Tech owns the tooling. Whether RA executes this work or advises the university's teams, the leads need a shared view of who is responsible for what before work begins."}
    ],
    rule:"If the question is 'what should we say and to whom' — Marketing leads the answer. If the question is 'how do we build it and measure it' — Tech leads. The division holds whether RA is executing directly or advising the university's teams."
  },
  "mkt-enrollment": {
    title:"Marketing + Enrollment", subtitle:"Enrollment owns the outcome",
    tag:"Shared zone", tagBg:"#F1EFE8", tagColor:"#444441",
    note:"Marketing fills the funnel; Enrollment converts it. The handoff between them is the most common source of dropped balls in higher ed. This overlap exists whether RA holds both leads, one of them, or is advising university teams who hold both.",
    items:[
      {t:"Lead nurture content and email sequences",b:"Marketing produces the content; Enrollment advises on what prospects actually ask, object to, and respond to. In some engagements RA writes and manages these sequences directly; in others, RA provides the framework and the university's team executes it. Either way, both leads need to be actively reviewing performance together."},
      {t:"Messaging consistency across the funnel",b:"When an ad makes a claim and an advisor says something different, prospects notice. Aligning campaign messaging with advisor conversations is a shared responsibility. RA may audit this directly or facilitate the alignment conversation between the university's marketing and enrollment teams."},
      {t:"Inquiry-stage prospect experience",b:"Marketing owns the landing page and initial auto-response; Enrollment owns what happens after submission. The seam between those two is where most prospect experiences break — and it often involves both RA-managed and university-managed touchpoints."},
      {t:"Program positioning feedback from the field",b:"Advisors hear what prospects say about programs every day. That intelligence should inform marketing messaging. The Enrollment Lead owns the feedback loop; the Marketing Lead acts on it. Whether this exchange happens within RA's team or across RA and a university enrollment team, it needs a regular cadence."}
    ],
    rule:"If the prospect has not yet submitted an inquiry, the Marketing Lead should drive the response. Once they raise their hand, the Enrollment Lead takes the relationship. This boundary holds regardless of whether RA or the university holds either role."
  },
  "tech-finance": {
    title:"Tech + Finance", subtitle:"Finance owns the metric",
    tag:"Shared zone", tagBg:"#F1EFE8", tagColor:"#444441",
    note:"Finance depends on Tech to produce accurate, timely data. Tech depends on Finance to define what matters. This is true whether RA holds both leads, one of them, or is working alongside university-side teams who hold them.",
    items:[
      {t:"Reporting architecture and dashboard infrastructure",b:"Tech builds the dashboards; Finance defines what goes in them. In some engagements RA builds and maintains both; in others, RA advises on dashboard design while the university's IT or data team handles implementation. Both leads need to sign off on what is being measured and how."},
      {t:"Technology budget decisions and ROI evaluation",b:"Finance owns the budget standard; Tech owns the cost estimate and benefit case. Whether RA is advising the university's CFO directly or working through internal finance and IT teams, these two leads need to arrive at technology investment decisions together."},
      {t:"Data accuracy in financial models",b:"When Finance builds a revenue forecast off data that Tech is responsible for capturing, errors in the data pipeline become a shared problem. RA may own one side of this, the university may own the other — a clear agreement on the source of truth is essential before either team builds on the data."},
      {t:"Vendor spend analysis for technology tools",b:"Finance reviews the spend; Tech defends the value. In university environments, technology procurement often involves procurement offices, IT governance, and budget committees alongside RA's advisory input. Both leads need to know who holds the decision."}
    ],
    rule:"If the question is 'is the number right' — Finance leads the answer. If the question is 'why is the number not appearing' — Tech leads. The division holds whether RA holds these roles directly or is advising the university's finance and technology teams."
  },
  "enroll-finance": {
    title:"Enrollment + Finance", subtitle:"Finance sets policy, Enrollment executes",
    tag:"Shared zone", tagBg:"#F1EFE8", tagColor:"#444441",
    note:"Aid strategy is the highest-leverage intersection of these two leads. Misalignment here costs institutions money and students. In most university engagements, aid policy is a university decision — the Finance and Enrollment Leads shape the analysis and recommendations, but final authority rests with institutional leadership.",
    items:[
      {t:"Aid packaging and scholarship deployment",b:"Finance frames the aid strategy and sets discount rate parameters; Enrollment provides the field intelligence that keeps the policy competitive. RA may model aid scenarios directly or advise the university's financial aid and enrollment teams as they develop the strategy together."},
      {t:"Yield modeling and enrollment projections",b:"Finance uses enrollment projections to build financial models; Enrollment builds those projections from funnel data. Whether RA produces these projections or the university's teams do, both leads need to validate the inputs before either side builds on them."},
      {t:"Discount rate strategy by program",b:"Some programs can sustain a higher discount to drive volume; others cannot. The Finance Lead frames the ceiling; the Enrollment Lead advises on competitive context. This is an ongoing conversation — RA typically facilitates it, and the university retains the final call on policy."},
      {t:"Enrollment targets tied to financial goals",b:"Finance sets revenue targets; Enrollment translates them into enrollment goals. When these are misaligned, both leads need to surface the conflict. RA may mediate this directly or help the university's leadership team structure the conversation between their finance and enrollment functions."}
    ],
    rule:"If the question is 'what should our aid policy be' — Finance leads the analysis. If the question is 'how do we apply that policy with individual students' — Enrollment leads. In most cases, the university holds final authority on policy; RA's role is to ensure the decision is well-informed."
  },
  "mkt-finance": {
    title:"Marketing + Finance", subtitle:"Finance sets the ceiling, Marketing deploys within it",
    tag:"Shared zone", tagBg:"#F1EFE8", tagColor:"#444441",
    note:"Marketing needs budget authority; Finance needs ROI accountability. This overlap is often undermanaged in higher ed — either Finance sets budgets without understanding marketing's actual cost drivers, or Marketing spends without clear return expectations. RA's role is to bring these two leads into alignment, whether RA holds one or both functions or is advising university teams who do.",
    items:[
      {t:"Marketing budget authorization by program",b:"Finance frames program-level marketing budgets based on the financial model; Marketing operates within them. In some engagements RA advises the CFO or Provost directly on budget allocation; in others, RA works with the university's marketing leadership to build the business case for the budget they need."},
      {t:"CAC benchmarks and LTV:CAC targets",b:"The Finance Lead sets the financial threshold for what a student is worth to acquire; Marketing optimizes toward that number. Whether RA establishes these benchmarks directly or helps the university's finance and marketing teams agree on them, the number needs to exist and both leads need to be working toward it."},
      {t:"Attribution methodology and reporting standards",b:"How marketing spend gets credited to enrolled students is a shared decision. Finance needs an auditable number; Marketing needs a methodology that reflects how the funnel actually works. RA typically leads the design of this methodology, but it only functions if the university's data and finance teams can sustain it."},
      {t:"Program-level marketing investment decisions",b:"When a new program launches or an existing one underperforms, Finance and Marketing need to agree on whether increased spend is justified. RA may advise university leadership directly on this decision or help the two functions structure their own decision-making process."},
      {t:"ROI reporting and spend reconciliation",b:"Marketing produces the performance data; Finance ties it to financial outcomes. RA may build and maintain this reporting layer or help the university establish it internally — but both leads need to be reviewing the same numbers on a regular cadence."}
    ],
    rule:"If the question is 'how much should we spend on this program' — Finance leads the answer. If the question is 'how should we deploy that spend' — Marketing leads. RA's role is to ensure these two leads are working from the same financial picture, whether RA holds them directly or advises the university's teams."
  },
  "tech-enrollment": {
    title:"Tech + Enrollment", subtitle:"Enrollment defines the need, Tech builds the system",
    tag:"Shared zone", tagBg:"#F1EFE8", tagColor:"#444441",
    note:"Enrollment advisors work inside systems that Tech is responsible for building and maintaining. This overlap is particularly important in university engagements where RA may hold one lead and the university's internal team holds the other — clear requirements and communication between the two are essential.",
    items:[
      {t:"CRM workflow design for enrollment",b:"Enrollment defines what the workflow needs to accomplish; Tech configures the system to make it happen. In many university engagements, the CRM is owned and operated by the university's IT or enrollment team — the Tech Lead's role may be to advise on configuration rather than build it directly."},
      {t:"Advisor tooling and system access",b:"What tools advisors have, how they access data, and what they can see in the CRM are Tech decisions made in response to Enrollment requirements. When advisors are university employees working in university-owned systems, RA typically advises on what the setup should look like and works with the university's team to get there."},
      {t:"Lead routing automation",b:"How inquiries are assigned to advisors, re-routed, and escalated requires both leads. Enrollment defines the rules; Tech implements them. Whether RA builds the automation or advises the university's team on how to configure it, the business logic must be agreed on by both leads before implementation."},
      {t:"Enrollment reporting dashboards",b:"The metrics, thresholds, and views that advisors and enrollment managers use daily are defined by Enrollment and built by Tech. In university engagements, RA may design the dashboard framework while the university's IT or data team handles the build — both leads need to validate the output."},
      {t:"Automated outreach systems",b:"Enrollment defines the cadence, content, and triggers for automated outreach; Tech builds the system that executes it. In many engagements this spans RA-managed tools and university-managed platforms — both leads need to know where each component lives and who is responsible for maintaining it."}
    ],
    rule:"If the question is 'what do enrollment advisors need the system to do' — Enrollment leads the answer. If the question is 'how do we build or configure it' — Tech leads. Whether RA or the university's team holds either role, this division of responsibility needs to be explicit."
  },
  analytics: {
    title:"Analytics", subtitle:"Grey area — ad hoc role clarity required",
    tag:"Grey area", tagBg:"#F1EFE8", tagColor:"#444441",
    note:"All four leads have a legitimate claim on analytics. Marketing needs attribution data. Tech owns the infrastructure. Enrollment needs funnel reporting. Finance needs ROI measurement. Given we don't have a named owner at RA, clear roles need to be determined each time through mutual agreement by leads.",
    items:[
      {t:"Marketing attribution reporting",b:"Which channels are driving qualified inquiries? What is the cost per inquiry by source? These questions need answers for Marketing to allocate spend effectively. Whether RA produces this reporting or the university's marketing team does, the Marketing Lead needs to know where the numbers come from and who maintains them."},
      {t:"Enrollment funnel reporting",b:"Conversion rates from inquiry to application, application to admit, admit to enrolled — by program, by source, by term. Enrollment needs these to manage pipeline; Finance needs them to build forecasts. In university engagements, this data often lives in systems RA does not directly control — establishing a shared view requires agreement across leads."},
      {t:"Technology and systems performance reporting",b:"CRM health, integration reliability, and attribution infrastructure performance. These reports often live in the same systems as marketing and enrollment dashboards. Whether RA manages the infrastructure or advises the university's IT team, both the Tech Lead and the leads who depend on the data need to be clear on who maintains what."},
      {t:"ROI and cost-per-enrolled-student measurement",b:"Producing a true CAC requires data from all four functions. Whether RA builds this metric or the university's finance and analytics teams do, it will not get made accurately without deliberate collaboration across leads and a shared agreement on methodology."},
      {t:"How to approach analytics ownership on each engagement",b:"Because there is no standing named owner, each engagement needs an explicit agreement at the outset: who produces which reports, who validates them, and who the other leads go to when numbers look wrong. RA typically facilitates this conversation, but the university's leadership team needs to ratify the structure."}
    ],
    rule:null
  }
};

const panel   = document.getElementById('panel');
const pTitle  = document.getElementById('panelTitle');
const pSub    = document.getElementById('panelSubtitle');
const pTag    = document.getElementById('panelTag');
const pBody   = document.getElementById('panelBody');
const otBox   = document.getElementById('otBox');
const otVal   = document.getElementById('otVal');
const closeBtn= document.getElementById('closeBtn');
const overlay = document.getElementById('overlay');
const diagArea= document.getElementById('diagramArea');

function openPanel(id) {
  const d = D[id]; if (!d) return;
  pTag.textContent = d.tag;
  pTag.style.background = d.tagBg;
  pTag.style.color = d.tagColor;
  pTitle.textContent = d.title;
  pSub.textContent   = d.subtitle;
  if (d.oneThing) {
    otBox.style.display = 'flex';
    otBox.style.background = d.otBg;
    otVal.style.color = d.otColor;
    otVal.textContent = d.oneThing;
  } else { otBox.style.display = 'none'; }

  let html = '';
  if (d.note) html += `<div class="overlap-note">${d.note}</div>`;
  html += '<ul class="resp-list">';
  d.items.forEach(item => {
    html += `<li class="resp-item">
      <div class="item-dot" style="background:${d.tagColor}"></div>
      <div><div class="item-title">${item.t}</div><div class="item-body">${item.b}</div></div>
    </li>`;
  });
  html += '</ul>';
  if (d.rule) html += `<div class="rule-box"><div class="rule-label">Decision rule</div>${d.rule}</div>`;

  pBody.innerHTML = html;
  pBody.scrollTop = 0;
  panel.classList.add('open');
  diagArea.classList.add('shifted');
  overlay.classList.add('visible');
}

function closePanel() {
  panel.classList.remove('open');
  diagArea.classList.remove('shifted');
  overlay.classList.remove('visible');
}

document.querySelectorAll('.node[data-id]').forEach(n => {
  n.addEventListener('click', () => openPanel(n.dataset.id));
  n.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') { e.preventDefault(); openPanel(n.dataset.id); } });
});

closeBtn.addEventListener('click', closePanel);
overlay.addEventListener('click', closePanel);
document.addEventListener('keydown', e => { if (e.key==='Escape') closePanel(); });
</script>
</body>
</html>
